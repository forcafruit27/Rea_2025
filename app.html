<body>

</div>

<script>
(function(){
  var PASSWORD = 'jgs2026';
  if(sessionStorage.getItem('jgs_rea_ok') === 'granted'){
    document.addEventListener('DOMContentLoaded', function(){
      document.getElementById('passwordScreen').style.display = 'none';
    });
  }
})();

function checkPwd(){
  var PASSWORD = 'jgs2026';

    sessionStorage.setItem('jgs_rea_ok', 'granted');

<div class="wrap">
<div style="text-align:center;padding:6px 0;font-size:10px;color:#666;letter-spacing:1px">REA 2025 - CALCULO COSTES REGIMEN AGRARIO | Celdas amarillas = editables</div>
<div id="app"><p style="padding:20px;text-align:center">Cargando...</p></div>
</div>
<script>
var E="\u20ac",DA="\u2014";
try{
var S={
  jorn:1, hDia:6.667, brutoH:9.41,
  irpfP:2, sstP:6.45, itP:1.55, imsP:1.2,
  ccEmpP:21.30, desempP:6.70, formP:0.15, fogP:0.10,
  fRecMed:1.25, dietas:0, transp:4,
  gtosGen:4.8, gtosFin:0.6, bInd:1,
  indemnOn:1, c6Thresh:60.05,
  red21d:0.119, red21m:-2.2918, red24d:0.1076, red24m:-1.5799,
  nCCtotal:25.66, nCCtotalV:25.46, nCCtrab:4.70,
  nMEItotal:0.80, nMEItrab:0.13,
  nDEStotal:8.30, nDEStrab:1.60,
  nFORMtotal:0.18, nFORMtrab:0.03,
  nIT:1.55, nIMS:1.20, nFOG:0.10,
  nSEAjorn:7.45, nSEAmens:163.84, nINDEMN:3.28767
};
var panelOpen=false;
var normUnlocked=false;
var NORM_PASSWORD='Juangarciasa27?';

function openNormativa(){
  if(panelOpen){panelOpen=false;render();return}
  if(normUnlocked){panelOpen=true;render();return}
  var pwd=prompt('Introduce la contraseña de administrador:');
  if(pwd===NORM_PASSWORD){normUnlocked=true;panelOpen=true;render()}
  else if(pwd!==null){alert('Contraseña incorrecta')}
}

// === SISTEMA DE VERSIONES NORMATIVA ===
var NORM_KEYS=["nCCtotal","nCCtotalV","nCCtrab","nMEItotal","nMEItrab","nDEStotal","nDEStrab","nFORMtotal","nFORMtrab","nIT","nIMS","nFOG","nSEAjorn","nSEAmens","nINDEMN","red24d","red24m"];
var normHist=[];
try{var _h=localStorage.getItem("rea2025v2_hist");if(_h)normHist=JSON.parse(_h)}catch(e){}

function normSnap(){
  var snap={fecha:new Date().toLocaleString("es-ES"),vals:{}};
  for(var i=0;i<NORM_KEYS.length;i++) snap.vals[NORM_KEYS[i]]=S[NORM_KEYS[i]];
  // No duplicar si no ha cambiado nada
  if(normHist.length>0){
    var last=normHist[normHist.length-1];
    var same=true;
    for(var i=0;i<NORM_KEYS.length;i++){if(last.vals[NORM_KEYS[i]]!==snap.vals[NORM_KEYS[i]]){same=false;break}}
    if(same)return;
  }
  normHist.push(snap);
  if(normHist.length>50) normHist=normHist.slice(-50);
  try{localStorage.setItem("rea2025v2_hist",JSON.stringify(normHist))}catch(e){}
}
function normRestore(idx){
  var snap=normHist[idx];
  if(!snap)return;
  for(var k in snap.vals) S[k]=snap.vals[k];
  render();
}
// Guardar estado inicial si no hay historial
if(normHist.length===0) normSnap();

function calc(){
  var s=S;
  var R2=function(x){return Math.round(x*100)/100};
  var bruto=s.brutoH;
  var G5=bruto*(s.nINDEMN/100);
  var G4=s.indemnOn==1?bruto-G5:bruto;
  var G6=G4+G5;
  var C4=G6*s.jorn*s.hDia;
  var C6=G4*s.jorn*s.hDia;
  var C7=G5*s.hDia*s.jorn;

  // === TABLA DERECHA T/V/W - calculada desde normativa ===
  var D15=s.red24d, D16r=s.red24m;

  // Contingencias Comunes
  var W3=R2(s.nCCtrab/100*C6);
  var T3=R2(s.nCCtotal/100*C6)-W3;
  var V3=R2(s.nCCtotalV/100*C6)-W3;

  // MEI
  var W4=R2(s.nMEItrab/100*C6);
  var T4=R2(s.nMEItotal/100*C6)-W4;
  var V4=R2(s.nMEItotal/100*C6)-W4;

  // Reduccion SEA
  var T5=(T3-R2(C6*D15))<(s.jorn*s.nSEAjorn)?T3-(s.jorn*s.nSEAjorn):R2(C6*D15);
  var V5=(V3-R2(C6*D16r))<s.nSEAmens?V3-s.nSEAmens:R2(C6*D16r);

  // Liquido Cont. Comunes
  var T6=T3+T4-T5;
  var V6=V3+V4-V5;
  var W6=W3+W4;

  // IT / IMS
  var T7=R2(s.nIT/100*C6);
  var V7=R2(s.nIT/100*C6);
  var T8=R2(s.nIMS/100*C6);
  var V8=R2(s.nIMS/100*C6);
  var T9=T7+T8;
  var V9=V7+V8;

  // Desempleo
  var W10=R2(s.nDEStrab/100*C6);
  var T10=R2(s.nDEStotal/100*C6)-W10;
  var V10=R2(s.nDEStotal/100*C6)-W10;

  // FOGASA
  var T11=R2(s.nFOG/100*C6);
  var V11=R2(s.nFOG/100*C6);

  // Formacion
  var W12=R2(s.nFORMtrab/100*C6);
  var T12=R2(s.nFORMtotal/100*C6)-W12;
  var V12=R2(s.nFORMtotal/100*C6)-W12;

  // Subtotales otras cotizaciones
  var W13=W10+W12;
  var T13=T10+T11+T12;
  var V13=V10+V11+V12;

  // Totales
  var T14=T6+T9+T13;
  var V14=V6+V9+V13;
  var W14=W6+W13;

  // === COLUMNA C - lee de T/V/W (igual que Excel) ===
  var C8=T7;
  var C9=T8;
  var C10=C4*(s.irpfP/100);
  var C11=W14;
  var C12=s.jorn>21?V6:T6;
  var C17=T10;
  var C18=T12;
  var C19=T11;
  var C20=s.jorn>21?V14:T14;
  var C21=C4+C20;
  var C22=s.jorn>0&&C4>0?(C20/s.jorn)/(C4/s.jorn):0;
  var C23=s.jorn>0&&C6>0?(C20/s.jorn)/(C6/s.jorn):0;
  var D25=C4-C10-C11;
  var D27=C20+C11;
  var D23=s.jorn>0&&s.hDia>0?(D25/s.jorn)/s.hDia:0;

  // === COSTES POR HORA (columna G) ===
  var G8=G4*(s.fRecMed/100);
  var G9=s.hDia>0?s.dietas/s.hDia:0;
  var G10=s.hDia>0?(s.transp/s.hDia)*C22+(s.transp/s.hDia):0;
  var G7=C23*G4;
  var G11=G4+G5+G7+G8+G9+G10;
  var H11=G11*s.hDia;
  var G12=G11*(s.gtosGen/100);
  var G13=G11*(s.gtosFin/100);
  var G14=G11*(s.bInd/100);
  var G17=G11+G12+G13+G14;
  var H17=G17*s.hDia;
  var G18=G17>0?(G17-G11)/G17:0;
  var G19=G6>0?G17/G6/100:0;

  var horasLimite=s.jorn*s.hDia>160;
  var c6Low=C6<s.c6Thresh;

  return{C4:C4,C6:C6,C7:C7,C8:C8,C9:C9,C10:C10,C11:C11,C12:C12,
    C17:C17,C18:C18,C19:C19,C20:C20,C21:C21,C22:C22,C23:C23,
    D25:D25,D27:D27,D23:D23,
    G4:G4,G5:G5,G6:G6,G7:G7,G8:G8,G9:G9,G10:G10,G11:G11,G12:G12,G13:G13,G14:G14,
    G17:G17,G18:G18,G19:G19,H11:H11,H17:H17,
    T3:T3,T4:T4,T5:T5,T6:T6,T7:T7,T8:T8,T9:T9,T10:T10,T11:T11,T12:T12,T13:T13,T14:T14,
    V3:V3,V4:V4,V5:V5,V6:V6,V7:V7,V8:V8,V9:V9,V10:V10,V11:V11,V12:V12,V13:V13,V14:V14,
    W3:W3,W4:W4,W6:W6,W10:W10,W12:W12,W13:W13,W14:W14,
    horasLimite:horasLimite,c6Low:c6Low,F17:s.brutoH*s.hDia};
}

function f2(v){return(v==null||isNaN(v))?DA:Number(v).toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2})}
function f4(v){return(v==null||isNaN(v))?DA:Number(v).toLocaleString("es-ES",{minimumFractionDigits:4,maximumFractionDigits:4})}
function fp(v){return(v==null||isNaN(v))?DA:(Number(v)*100).toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2})+"%"}
function inp(k){return'<input class="n" data-k="'+k+'" value="'+String(S[k]).replace(".",",")+'" onfocus="this.select()" onchange="upd(this)" onblur="fmti(this)">'}
// Formula input: full editable formula, parses percentage(s) on change
// k = S key to update, formula = full Excel formula string
function fmli(k,formula){
  return '<input type="text" data-k="FML_'+k+'" value="'+formula+'" onchange="parseFml(this,\''+k+'\')" onfocus="this.select()" style="width:100%;box-sizing:border-box;font-size:9px;font-family:monospace;padding:2px 4px;border:1px solid #8eb4e2;border-radius:2px;background:#ffffcc">';
}
function parseFml(el,k){
  // Extract first number before % sign
  var txt=el.value;
  var m=txt.match(/([\d]+[,.]?[\d]*)%/);
  if(m){
    var v=parseFloat(m[1].replace(',','.'));
    if(!isNaN(v)){S[k]=v;render();return;}
  }
  // For SEA fields without %, extract first decimal number
  var m2=txt.match(/([-]?[\d]+[,.]?[\d]*)/);
  if(m2){
    var v2=parseFloat(m2[1].replace(',','.'));
    if(!isNaN(v2)){S[k]=v2;render();return;}
  }
}

function render(){
  var r=calc(),s=S;
  var h="";
  
  // TITLE
  h+='<div class="t" style="background:#b4c6e7;padding:8px;border-radius:4px;margin-bottom:6px;text-align:center">Calculo costes regimen agrario 2025';
  h+='<span style="float:right;font-size:13px">Indemn: <select data-k="indemnOn" onchange="S.indemnOn=Number(this.value);render()" style="font-size:13px"><option value="1"'+(s.indemnOn==1?' selected':'')+'>SI</option><option value="0"'+(s.indemnOn!=1?' selected':'')+'>NO</option></select></span>';
  h+='<span style="float:left"><button onclick="openNormativa()" style="font-size:11px;padding:4px 12px;border-radius:6px;border:1px solid #2060a0;background:'+(panelOpen?'#2060a0':'#fff')+';color:'+(panelOpen?'#fff':'#2060a0')+';cursor:pointer;font-weight:700">'+(panelOpen?'Cerrar':'Normativa %')+'</button></span>';
  h+='</div>';

  // PANEL NORMATIVA - tabla cotizaciones con formulas editables
  if(panelOpen){
    var fmi=function(k,tpl){
      var v=String(s[k]).replace('.',',');
      var txt=tpl.replace('{v}',v);
      return '<input type="text" data-k="'+k+'" value="'+txt+'" onfocus="this.select()" onchange="var m=this.value.match(/([\\d]+[,.]?[\\d]*)\\s*%/);if(m){S.'+k+'=parseFloat(m[1].replace(\u0027,\u0027,\u0027.\u0027))||0;normSnap();render()}" style="width:100%;box-sizing:border-box;font-size:9px;padding:2px 3px;border:1px solid #8eb4e2;border-radius:2px;background:#ffffcc;font-family:monospace">'};
    var fmv=function(k,tpl){
      var v=String(s[k]).replace('.',',');
      var txt=tpl.replace('{v}',v);
      return '<input type="text" data-k="'+k+'" value="'+txt+'" onfocus="this.select()" onchange="var m=this.value.match(/(-?[\\d]+[,.]?[\\d]*)/);if(m){S.'+k+'=parseFloat(m[1].replace(\u0027,\u0027,\u0027.\u0027))||0;normSnap();render()}" style="width:100%;box-sizing:border-box;font-size:9px;padding:2px 3px;border:1px solid #8eb4e2;border-radius:2px;background:#ffffcc;font-family:monospace">'};
    var pec='<td></td>';
    var poc='font-size:9px;text-align:left;padding:2px';
    h+='<div style="background:#eef2f8;border:2px solid #8eb4e2;border-radius:8px;padding:10px;margin-bottom:8px;overflow-x:auto">';
    // Cabecera con fecha y selector de versiones
    var lastDate=normHist.length>0?normHist[normHist.length-1].fecha:'sin datos';
    h+='<div style="display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:8px;gap:6px">';
    h+='<div style="font-weight:700;font-size:13px;color:#2060a0">COTIZACIONES - Formulas editables</div>';
    h+='<div style="font-size:11px;color:#2060a0"><b>\u00daltima actualizaci\u00f3n:</b> '+lastDate+'</div>';
    h+='<div style="font-size:11px">';
    if(normHist.length>1){
      h+='<select onchange="if(this.value!==\u0027\u0027){normRestore(Number(this.value))}" style="font-size:10px;padding:2px 4px;border:1px solid #2060a0;border-radius:4px">';
      h+='<option value="">Restaurar version anterior...</option>';
      for(var hi=normHist.length-2;hi>=0;hi--){
        h+='<option value="'+hi+'">'+normHist[hi].fecha+'</option>';
      }
      h+='</select>';
    } else {
      h+='<span style="color:#888;font-size:10px">(sin versiones anteriores)</span>';
    }
    h+='</div>';
    h+='</div>';
    h+='<table style="width:100%;font-size:11px;border-collapse:collapse">';
    h+='<tr style="background:#d6e4f0"><th style="text-align:left;padding:4px 6px;width:22%">Concepto</th><th style="padding:4px;width:8%">EMPRESA</th><th style="padding:4px;width:10%">EMP C/RED J</th><th style="padding:4px;width:10%">EMP J&ge;22</th><th style="padding:4px;width:8%">TRABAJ.</th><th style="padding:4px;width:42%">FORMULA (editar %)</th></tr>';

    // CC
    h+='<tr><td style="text-align:left;padding:3px 6px">CONT. COMUNES</td>';
    h+='<td>'+f2(r.T3)+'</td>'+pec+'<td>'+f2(r.V3)+'</td><td>'+f2(r.W3)+'</td>';
    h+='<td style="'+poc+'">'+fmi("nCCtotal","T=RED({v}%*$C$6;2)-$W$3")+'</td></tr>';
    h+='<tr><td></td><td colspan="4"></td>';
    h+='<td style="'+poc+'">'+fmi("nCCtotalV","V=RED({v}%*$C$6;2)-$W$3")+'</td></tr>';
    h+='<tr><td></td><td colspan="4"></td>';
    h+='<td style="'+poc+'">'+fmi("nCCtrab","W=RED({v}%*$C$6;2)")+'</td></tr>';

    // MEI
    h+='<tr style="background:#f5f7fa"><td style="text-align:left;padding:3px 6px">MEI</td>';
    h+='<td>'+f2(r.T4)+'</td>'+pec+'<td>'+f2(r.V4)+'</td><td>'+f2(r.W4)+'</td>';
    h+='<td style="'+poc+'">'+fmi("nMEItotal","T/V=RED({v}%*$C$6;2)-$W$4")+'</td></tr>';
    h+='<tr style="background:#f5f7fa"><td></td><td colspan="4"></td>';
    h+='<td style="'+poc+'">'+fmi("nMEItrab","W=RED({v}%*$C$6;2)")+'</td></tr>';

    // RED SEA
    h+='<tr><td style="text-align:left;padding:3px 6px">REDUCCION SEA</td>';
    h+='<td>'+f2(r.T5)+'</td>'+pec+'<td>'+f2(r.V5)+'</td>'+pec;
    h+='<td style="'+poc+'">'+fmv("red24d","T=SI(T3-RED($C$6*{v};2)<j*SEAjorn;...)")+'</td></tr>';
    h+='<tr><td></td><td colspan="4"></td>';
    h+='<td style="'+poc+'">'+fmv("nSEAjorn","  SEA min/jornada={v} "+E)+'</td></tr>';
    h+='<tr><td></td><td colspan="4"></td>';
    h+='<td style="'+poc+'">'+fmv("red24m","V=SI(V3-RED($C$6*{v};2)<SEAmens;...)")+'</td></tr>';
    h+='<tr><td></td><td colspan="4"></td>';
    h+='<td style="'+poc+'">'+fmv("nSEAmens","  SEA min mensual={v} "+E)+'</td></tr>';

    // LIQUIDO CC
    h+='<tr style="background:#fce4d6"><td style="text-align:left;padding:3px 6px;font-weight:700">LIQ. CONT. COMUNES</td>';
    h+='<td style="font-weight:700">'+f2(r.T6)+'</td>'+pec+'<td style="font-weight:700">'+f2(r.V6)+'</td><td style="font-weight:700">'+f2(r.W6)+'</td>';
    h+='<td style="font-size:9px;font-family:monospace;color:#888">T3+T4-T5 | V3+V4-V5 | W3+W4</td></tr>';

    // IT
    h+='<tr><td style="text-align:left;padding:3px 6px">IT</td>';
    h+='<td>'+f2(r.T7)+'</td>'+pec+'<td>'+f2(r.V7)+'</td>'+pec;
    h+='<td style="'+poc+'">'+fmi("nIT","T/V=RED({v}%*$C$6;2)")+'</td></tr>';

    // IMS
    h+='<tr style="background:#f5f7fa"><td style="text-align:left;padding:3px 6px">IMS</td>';
    h+='<td>'+f2(r.T8)+'</td>'+pec+'<td>'+f2(r.V8)+'</td>'+pec;
    h+='<td style="'+poc+'">'+fmi("nIMS","T/V=RED({v}%*$C$6;2)")+'</td></tr>';

    // LIQUIDO AT
    h+='<tr style="background:#fce4d6"><td style="text-align:left;padding:3px 6px;font-weight:700">LIQ. ACC. TRABAJO</td>';
    h+='<td style="font-weight:700">'+f2(r.T9)+'</td>'+pec+'<td style="font-weight:700">'+f2(r.V9)+'</td>'+pec;
    h+='<td style="font-size:9px;font-family:monospace;color:#888">T7+T8</td></tr>';

    // DESEMPLEO
